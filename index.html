<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tier List Pro - 排行榜</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#f1f5f9;--sf:#fff;--br:#e2e8f0;--tx:#1e293b;--t2:#64748b;--ac:#6366f1;--rd:8px;--sh:0 1px 3px rgba(0,0,0,.08)}
body{background:var(--bg);color:var(--tx);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans SC","PingFang SC","Microsoft YaHei",sans-serif;padding:24px;min-height:100vh;display:flex;justify-content:center}
.ap{width:100%;max-width:820px}
#export-area{background:var(--bg);border-radius:var(--rd);overflow:hidden;padding:16px}
.hd{background:var(--sf);box-shadow:var(--sh);padding:12px 16px;display:flex;align-items:center;gap:4px;border-radius:var(--rd) var(--rd) 0 0}
.hd .ti{font-size:22px;font-weight:700;border:none;border-bottom:2px solid transparent;outline:none;background:transparent;color:var(--tx);padding:4px 0;min-width:30px;cursor:text;transition:border-color .2s;white-space:nowrap}
.hd .ti:focus{border-bottom-color:var(--ac)}
.hd .ei{font-size:16px;opacity:.4;cursor:default;transition:opacity .15s;line-height:1}
.hd .ei:hover{opacity:.8}
.add{background:var(--sf);padding:8px 14px;display:flex;flex-wrap:wrap;align-items:center;gap:8px;border-top:1px solid var(--br);min-height:48px}
.add input[type=text]{flex:1 1 300px;padding:7px 10px;border:1px solid var(--br);border-radius:6px;font-size:15px;outline:none;height:38px;box-sizing:border-box}
.add input[type=text]:focus{border-color:var(--ac);box-shadow:0 0 0 3px rgba(99,102,241,.12)}
.add .ip{width:40px;height:38px;object-fit:cover;border-radius:4px;border:1px solid var(--br);flex-shrink:0}
.add .ir{background:none;border:none;color:var(--t2);cursor:pointer;font-size:16px;padding:0 2px;line-height:1;flex-shrink:0}
.add .ir:hover{color:#dc2626}
.btn{padding:7px 14px;border:none;border-radius:6px;font-size:14px;font-weight:500;cursor:pointer;transition:background .15s,transform .1s;white-space:nowrap;line-height:1.8}
.btn:active{transform:scale(.97)}
.bp{background:var(--ac);color:#fff}
.bp:hover{background:#4f46e5}
.bs{background:var(--bg);color:var(--tx)}
.bs:hover{background:#e2e8f0}
.bd{background:#fee2e2;color:#dc2626}
.bd:hover{background:#fecaca}
.tbl{border-radius:0 0 var(--rd) var(--rd);overflow:hidden;box-shadow:var(--sh);margin-bottom:0}
.rw{display:grid;grid-template-columns:80px 1fr;min-height:0}
.rw+.rw{border-top:1px solid var(--br)}
.rl{display:flex;align-items:center;justify-content:center;font-weight:700;font-size:15px;padding:12px 8px;text-align:center;user-select:none}
.rr{background:var(--sf);padding:12px;min-height:56px;display:flex;flex-wrap:wrap;gap:8px;align-items:flex-start;align-content:flex-start}
.rw.dag .rr{background:#f0f0ff}
.cd{padding:6px 10px;background:var(--bg);border-radius:6px;font-size:14px;cursor:grab;display:inline-flex;align-items:center;gap:6px;user-select:none;line-height:1.4}
.cd:hover{background:#e2e8f0}
.cd.dragging{opacity:.4}
.cd .cdi{width:auto;height:40px;max-width:80px;object-fit:contain;border-radius:4px;flex-shrink:0;aspect-ratio:auto}
.cd .dx{background:none;border:none;color:var(--t2);cursor:pointer;font-size:14px;padding:0 2px;line-height:1;border-radius:4px;transition:background .15s,color .15s}
.cd .dx:hover{background:#fecaca;color:#dc2626}
.po{background:var(--sf);border-radius:var(--rd);box-shadow:var(--sh);padding:14px 18px;margin:0 16px 14px 16px}
.po h3{font-size:14px;font-weight:600;margin-bottom:8px;color:var(--t2)}
.po-c{display:flex;flex-wrap:wrap;gap:8px;min-height:40px}
.pe{color:var(--t2);font-size:13px;padding:4px 0}
.exw{text-align:center;margin-bottom:32px}
.exw .btn{font-size:15px;padding:12px 28px;display:inline-flex;align-items:center;gap:6px}
.mo{position:fixed;inset:0;background:rgba(0,0,0,.35);display:flex;align-items:center;justify-content:center;z-index:1000;animation:fa .15s}
@keyframes fa{from{opacity:0}to{opacity:1}}
.mb{background:var(--sf);border-radius:var(--rd);box-shadow:0 8px 30px rgba(0,0,0,.15);padding:24px;min-width:300px;max-width:460px;animation:up .15s}
@keyframes up{from{transform:translateY(10px);opacity:0}to{transform:translateY(0);opacity:1}}
.mb h3{font-size:15px;margin-bottom:14px;font-weight:600}
.mb .br{display:flex;gap:8px;justify-content:flex-end;margin-top:16px}
.mb input[type=text]{width:100%;padding:8px 10px;border:1px solid var(--br);border-radius:6px;font-size:14px;outline:none}
.mb input[type=text]:focus{border-color:var(--ac)}
.mb textarea{width:100%;padding:8px 10px;border:1px solid var(--br);border-radius:6px;font-size:14px;outline:none;resize:vertical;min-height:100px;font-family:inherit}
.mb textarea:focus{border-color:var(--ac)}
@media(max-width:600px){body{padding:12px}.hd{padding:10px 14px}.hd .ti{font-size:18px}.rw{grid-template-columns:56px 1fr}.rl{font-size:13px;padding:10px 6px;word-break:break-all}.rr{padding:8px}.cd{padding:5px 8px}.cd .cdi{width:32px;height:32px}}
</style>
</head>
<body>
<div class="ap" id="app">
  <div id="export-area">
    <div class="hd">
      <span id="ti" class="ti" contenteditable="true" spellcheck="false">xxxx从夯到拉</span>
      <span class="ei">✏️</span>
    </div>
    <div class="add">
      <input id="ii" type="text" placeholder="输入选项名称">
      <img id="ip" class="ip" style="display:none">
      <button class="ir" id="ir" style="display:none">✕</button>
      <input type="file" id="if" accept="image/*" multiple hidden>
      <button class="btn bs" id="ib">🖼 图片</button>
      <button class="btn bp" id="ai">添加</button>
      <button class="btn bs" id="bi">批量添加文字</button>
    </div>
    <div class="tbl" id="tbl"></div>
  </div>
  <div class="po" id="po">
    <h3>未分类选项</h3>
    <div class="po-c" id="pc"><span class="pe" id="pe">尚未添加任何选项</span></div>
  </div>
  <div class="exw">
    <button class="btn bp" id="exb">📷 导出为图片</button>
  </div>
</div>
<script>
var TIERS = [
  {id:"t1",nm:"夯",bg:"#DC2626",tc:"#ffffff"},
  {id:"t2",nm:"顶级",bg:"#EA580C",tc:"#ffffff"},
  {id:"t3",nm:"人上人",bg:"#F59E0B",tc:"#1e293b"},
  {id:"t4",nm:"NPC",bg:"#FDE68A",tc:"#1e293b"},
  {id:"t5",nm:"拉",bg:"#F8FAFC",tc:"#1e293b"}
];
var CL=["#DC2626","#EA580C","#F59E0B","#FDE68A","#F8FAFC"];
var st={title:"xxxx从夯到拉",items:[],asgn:{}};
var nid=1,did=null,curImg=null;
function sv(){try{localStorage.setItem("rkp",JSON.stringify({t:st.title,it:st.items,as:st.asgn,ni:nid}))}catch(e){}}
function ld(){try{var d=JSON.parse(localStorage.getItem("rkp"));if(!d)return 0;st.title=d.t||"xxxx从夸到拉";st.items=d.it||[];st.asgn=d.as||{};nid=d.ni||1;return 1}catch(e){return 0}}
var $=function(id){return document.getElementById(id)};
var ti=$("ti"),tbl=$("tbl"),ii=$("ii"),ai=$("ai"),bi=$("bi"),pc=$("pc"),pe=$("pe"),exb=$("exb");
var ib=$("ib"),if_=$("if"),ip=$("ip"),ir=$("ir");
function r(){rT();rB();rP();sv()}
function rT(){if(ti.textContent.trim()!==st.title)ti.textContent=st.title}
function rB(){tbl.innerHTML="";for(var i=0;i<TIERS.length;i++){var t=TIERS[i];var rw=document.createElement("div");rw.className="rw";rw.dataset.tid=t.id;var rl=document.createElement("div");rl.className="rl";rl.style.background=t.bg;rl.style.color=t.tc;rl.textContent=t.nm;var rr=document.createElement("div");rr.className="rr";rr.dataset.tid=t.id;rr.ondragover=function(e){e.preventDefault();e.currentTarget.parentElement.classList.add("dag")};rr.ondragleave=function(e){e.currentTarget.parentElement.classList.remove("dag")};rr.ondrop=(function(tid){return function(e){e.preventDefault();e.currentTarget.parentElement.classList.remove("dag");if(did){st.asgn[did]=tid;did=null;r()}}})(t.id);rw.appendChild(rl);rw.appendChild(rr);tbl.appendChild(rw)}for(var i=0;i<TIERS.length;i++){var t=TIERS[i];var rr=tbl.querySelector('.rr[data-tid="'+t.id+'"]');if(!rr)continue;var is=[];for(var j=0;j<st.items.length;j++){if(st.asgn[st.items[j].id]===t.id)is.push(st.items[j])}if(is.length){rr.innerHTML="";for(var j=0;j<is.length;j++){rr.appendChild(cd(is[j]))}}}}
function rP(){var u=[];for(var i=0;i<st.items.length;i++){if(!st.asgn[st.items[i].id])u.push(st.items[i])}pc.innerHTML="";if(u.length){for(var i=0;i<u.length;i++)pc.appendChild(cd(u[i]))}else{pc.appendChild(pe)}}
function cd(it){var d=document.createElement("div");d.className="cd";d.draggable=true;d.dataset.iid=it.id;if(it.img){var im=document.createElement("img");im.className="cdi";im.src=it.img;d.appendChild(im)}var s;if(it.nm&&it.nm.trim()){s=document.createElement("span");s.textContent=it.nm}var x=document.createElement("button");x.className="dx";x.textContent="✕";x.title="删除选项";x.onclick=function(e){e.stopPropagation();var arr=[];for(var i=0;i<st.items.length;i++){if(st.items[i].id!==it.id)arr.push(st.items[i])}st.items=arr;delete st.asgn[it.id];r()};d.ondragstart=function(e){did=it.id;d.classList.add("dragging");e.dataTransfer.effectAllowed="move"};d.ondragend=function(){d.classList.remove("dragging");setTimeout(function(){did=null},100)};if(s)d.appendChild(s);d.appendChild(x);return d}
function addI(nm,im){nm=nm.trim();if(!nm&&!im)return;var id=nid++;if(!nm&&im)nm="   ";st.items.push({id:id,nm:nm,img:im||null});st.asgn[id]=null;r()}
function clrImg(){curImg=null;ip.style.display="none";ir.style.display="none";ip.src="";if_.value=""}
function cf(msg,ok){var o=document.createElement("div");o.className="mo";var b=document.createElement("div");b.className="mb";b.innerHTML="<h3>"+msg+"</h3><div class=\"br\"><button class=\"btn bs\" id=\"cc\">取消</button><button class=\"btn bd\" id=\"ck\">确定</button></div>";o.appendChild(b);document.body.appendChild(o);document.getElementById("cc").onclick=function(){o.remove()};document.getElementById("ck").onclick=function(){o.remove();ok()};o.onclick=function(e){if(e.target===o)o.remove()}}
function pt(msg,ok){var o=document.createElement("div");o.className="mo";var b=document.createElement("div");b.className="mb";b.innerHTML="<h3>"+msg+"</h3><textarea id=\"pta\" placeholder=\"每行一个选项\"></textarea><div class=\"br\"><button class=\"btn bs\" id=\"ptc\">取消</button><button class=\"btn bp\" id=\"pto\">确定</button></div>";o.appendChild(b);document.body.appendChild(o);var ta=document.getElementById("pta");ta.focus();var sb=function(){var v=ta.value.trim();if(v){o.remove();ok(v)}};document.getElementById("ptc").onclick=function(){o.remove()};document.getElementById("pto").onclick=sb;ta.onkeydown=function(e){if(e.key==="Enter"&&e.ctrlKey)sb()};o.onclick=function(e){if(e.target===o)o.remove()}}
ti.onblur=function(){var v=ti.textContent.trim();if(v){st.title=v;sv()}else ti.textContent=st.title};ti.onkeydown=function(e){if(e.key==="Enter"){e.preventDefault();ti.blur()}};
ib.onclick=function(){if_.click()};if_.onchange=function(){var fs=if_.files;if(!fs.length)return;if(fs.length>1){for(var i=0;i<fs.length;i++){(function(f){var r=new FileReader();r.onload=function(e){addI("",e.target.result)};r.readAsDataURL(f)})(fs[i])}if_.value="";return}var f=fs[0];var r=new FileReader();r.onload=function(e){curImg=e.target.result;ip.src=curImg;ip.style.display="";ir.style.display=""};r.readAsDataURL(f)};ir.onclick=clrImg;
ai.onclick=function(){addI(ii.value,curImg);ii.value="";clrImg()};ii.onkeydown=function(e){if(e.key==="Enter"){e.preventDefault();ai.click()}};
bi.onclick=function(){pt("批量添加选项，每行一个",function(v){var ps=v.split("\n");for(var i=0;i<ps.length;i++){var s=ps[i].trim();if(s)addI(s,null)}})};
pc.ondragover=function(e){e.preventDefault()};pc.ondrop=function(e){e.preventDefault();if(did){st.asgn[did]=null;did=null;r()}};
exb.onclick=function(){var el=document.getElementById("export-area");if(!el)return;var btn=exb;btn.disabled=true;btn.textContent="导出中...";var ae=el.querySelector(".add"),ei=el.querySelector(".ei"),dxs=el.querySelectorAll(".dx");if(ae)ae.style.display="none";if(ei)ei.style.display="none";for(var i=0;i<dxs.length;i++)dxs[i].style.display="none";function ru(){if(ae)ae.style.display="";if(ei)ei.style.display="";for(var i=0;i<dxs.length;i++)dxs[i].style.display=""}var s=document.createElement("script");s.src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js";s.onload=function(){html2canvas(el,{scale:2,useCORS:true,backgroundColor:"#f1f5f9",logging:false}).then(function(c){ru();c.toBlob(function(b){var a=document.createElement("a");a.href=URL.createObjectURL(b);a.download=(st.title||"xxxx从夸到拉")+".png";a.click();URL.revokeObjectURL(a.href);btn.disabled=false;btn.textContent="📷 导出为图片"})}).catch(function(){ru();btn.disabled=false;btn.textContent="📷 导出失败"})};s.onerror=function(){ru();btn.disabled=false;btn.textContent="📷 导出失败"};document.head.appendChild(s)};
ld();r();
</script>
</body>
</html>
